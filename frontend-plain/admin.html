<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel - Lost & Found</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Admin Review Panel</h1>
  <div id="pendingList" class="container"></div>

  <script type="module">
    const pass = prompt("Enter admin password:");
    if (pass !== "pass@123") {
      document.body.innerHTML = "<h2>Access Denied</h2>";
      throw new Error("Access denied");
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDEJKnW6ees67aE-ASdVL3PONMPTFq0ULE",
      authDomain: "lost-found-portal-c8e46.firebaseapp.com",
      databaseURL: "https://lost-found-portal-c8e46-default-rtdb.firebaseio.com",
      projectId: "lost-found-portal-c8e46",
      storageBucket: "lost-found-portal-c8e46.appspot.com",
      messagingSenderId: "543242831455",
      appId: "1:543242831455:web:3e8460967432848e2d3dea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pendingList = document.getElementById("pendingList");

    onValue(ref(db, "lost_items"), (snapshot) => {
      pendingList.innerHTML = "";
      snapshot.forEach((child) => {
        const key = child.key;
        const item = child.val();

        const div = document.createElement("div");
        div.classList.add("card");
        div.innerHTML = `
          <img src="${item.imageUrl || 'https://via.placeholder.com/200'}" width="200">
          <h3>${item.itemName}</h3>
          <p>${item.description}</p>
          <p>Status: ${item.approved ? "✅ Approved" : "⏳ Pending"}</p>
          ${!item.approved ? `<button id="approve-${key}">Approve</button>` : ""}
        `;
        pendingList.appendChild(div);

        if (!item.approved) {
          document.getElementById(`approve-${key}`).addEventListener("click", () => {
            update(ref(db, "lost_items/" + key), { approved: true });
          });
        }
      });
    });
  </script>
</body>
</html>
